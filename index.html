<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Default title & description (overridden per-page via react-helmet-async) -->
    <title>AptGuide - Find Apartments for Rent in California &amp; Florida</title>
    <meta
      name="description"
      content="Browse 50+ verified apartments for rent across California and Florida. Filter by city, price, and bedrooms. Find your perfect home today."
    />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://aptguide.com/" />

    <!-- Open Graph (Facebook / LinkedIn / WhatsApp) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="AptGuide" />
    <meta
      property="og:title"
      content="AptGuide — Find Apartments for Rent in California &amp; Florida"
    />
    <meta
      property="og:description"
      content="Browse 50+ verified apartments for rent across California and Florida. Filter by city, price, and bedrooms."
    />
    <meta
      property="og:image"
      content="https://images.unsplash.com/photo-1560448204-e02f11c3d0e2?auto=format&fit=crop&w=1200&q=80"
    />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:url" content="https://aptguide.com/" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta
      name="twitter:title"
      content="AptGuide — Find Apartments for Rent in California &amp; Florida"
    />
    <meta
      name="twitter:description"
      content="Browse 50+ verified apartments for rent across California and Florida."
    />
    <meta
      name="twitter:image"
      content="https://images.unsplash.com/photo-1560448204-e02f11c3d0e2?auto=format&fit=crop&w=1200&q=80"
    />

    <!-- Theme / PWA hints -->
    <meta name="theme-color" content="#1A73E8" />
    <meta name="application-name" content="AptGuide" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!--
      Hero image preload — tells the browser to fetch this image immediately,
      before it parses the JS bundle and discovers the CSS background-image.
      This is the LCP element on the Home page; early discovery cuts LCP
      by several seconds on slow connections.
    -->
    <link
      rel="preload"
      as="image"
      href="/hero-bg.webp"
      fetchpriority="high"
    />

    <!-- Fonts — async (non-render-blocking) -->
    <!--
      Loading strategy:
        1. preconnect  — opens the TCP connection to Google Fonts early
        2. rel=preload + onload swap — fetches the CSS file in the background,
           then swaps rel to "stylesheet" once it's ready. This removes the
           ~970 ms render-blocking delay from the critical path entirely.
        3. <noscript>  — fallback for browsers with JS disabled
    -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="preload"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      as="style"
      onload="this.onload=null;this.rel='stylesheet'"
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      />
    </noscript>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
